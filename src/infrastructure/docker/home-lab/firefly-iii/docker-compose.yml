services:
  app:
    image: fireflyiii/core:latest
    hostname: app
    container_name: firefly_iii_core
    restart: always
    volumes:
      - firefly_iii_upload:/var/www/html/storage/upload
    env_file: .env
    networks:
      - firefly_iii
    ports:
      - 8080:8080
    depends_on:
      - db
  # TODO: If you already have postgresql, then delete the db section from the compose file and change the database access configuration in the .env file.
  db:
    image: postgres:latest
    hostname: db
    container_name: firefly_iii_db
    restart: always
    env_file: .db.env
    networks:
      - firefly_iii
    volumes:
      - firefly_iii_db:/var/lib/postgresql/data
  importer:
    image: fireflyiii/data-importer:latest
    hostname: importer
    restart: always
    container_name: firefly_iii_importer
    networks:
      - firefly_iii
    ports:
      - '8081:8080'
    depends_on:
      - app
    env_file: .importer.env
  cron:
    # To make this work, set STATIC_CRON_TOKEN in your .env file or as an environment variable and replace "firefly_cron_token12345678901234" below
    # The STATIC_CRON_TOKEN must be *exactly* 32 characters long
    image: alpine
    restart: always
    container_name: firefly_iii_cron
    env_file: .env
    command: sh -c "
      apk add tzdata
      && ln -s /usr/share/zoneinfo/${TZ} /etc/localtime
      | echo \"0 3 * * * wget -qO- http://app:8080/api/v1/cron/firefly_cron_token12345678901234;echo\"
      | crontab -
      && crond -f -L /dev/stdout"
    networks:
      - firefly_iii

volumes:
   firefly_iii_upload:
   firefly_iii_db:

networks:
  firefly_iii:
    driver: bridge
